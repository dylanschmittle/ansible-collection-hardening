---
name: actionlint

on:  # yamllint disable-line rule:truthy
  push:
    branches: [master]
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
  pull_request:
    branches: [master]
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'

permissions:
  contents: read

jobs:
  actionlint:
    name: Lint GitHub Actions workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Install actionlint
        env:
          ACTIONLINT_VERSION: 1.7.7
        run: |
          set -euo pipefail
          curl --proto '=https' --tlsv1.2 -fsSL \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            -o actionlint.tar.gz
          tar -xzf actionlint.tar.gz actionlint
          ./actionlint -version

      - name: Run actionlint
        # SC1090: "ShellCheck can't follow non-constant source" — the
        # existing workflows source ~/.venv/.../activate which trips this
        # false positive on a constant-but-tilde-expanded path.
        run: ./actionlint -color -shellcheck="shellcheck -e SC1090"
