---
name: Structure Tests

on:  # yamllint disable-line rule:truthy
  push:
    branches: [master]
    paths:
      - 'galaxy.yml'
      - 'meta/**'
      - 'roles/**/README.md'
      - 'roles/**/meta/**'
      - 'roles/**/defaults/**'
      - 'roles/**/tasks/main.yml'
      - 'roles/**/handlers/main.yml'
      - 'tests/structure/**'
      - '.github/workflows/structure-tests.yml'
      - 'SECURITY.md'
      - 'CODE_OF_CONDUCT.md'
      - 'CONTRIBUTING.md'
      - '.editorconfig'
      - '.gitignore'
  pull_request:
    branches: [master]
    paths:
      - 'galaxy.yml'
      - 'meta/**'
      - 'roles/**/README.md'
      - 'roles/**/meta/**'
      - 'roles/**/defaults/**'
      - 'roles/**/tasks/main.yml'
      - 'roles/**/handlers/main.yml'
      - 'tests/structure/**'
      - '.github/workflows/structure-tests.yml'
      - 'SECURITY.md'
      - 'CODE_OF_CONDUCT.md'
      - 'CONTRIBUTING.md'
      - '.editorconfig'
      - '.gitignore'

permissions:
  contents: read

jobs:
  structure:
    name: Collection structure sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: tests/structure/requirements.txt

      - name: Install test dependencies
        run: python -m pip install -r tests/structure/requirements.txt

      - name: Run structural tests
        run: python -m pytest tests/structure -v
